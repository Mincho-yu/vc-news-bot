name: VC News Bot

on:
  schedule:
    - cron: '45 23 * * *'  # UTC 23:45 = 한국시간 08:45, 지연 감안해 9시쯤 도착
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install feedparser requests pytz
      - name: Run news bot
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python news_bot.py
